<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Theme Manager</title>
</head>
<body>
    <h2>Theme Manager</h2>

    <label>Background Color: </label>
    <input type="color" id="bg" value="#ffffff"><br><br>

    <label>Text Color: </label>
    <input type="color" id="text" value="#000000"><br><br>

    <label>Button Color: </label>
    <input type="color" id="btn" value="#007bff"><br><br>

    <button id="sampleBtn">Sample Button</button>
    <br><br>
    <button onclick="applyTheme()">Apply</button>
    <button onclick="resetTheme()">Reset</button>

    <script src="script.js"></script>
</body>
</html>
