<!DOCTYPE html>
<html>
<head>
    <title>Smart Calculator</title>
</head>
<body>

<h2>Smart Calculator</h2>

<input type="text" id="n1" placeholder="Enter first number">
<input type="text" id="n2" placeholder="Enter second number">

<br><br>

<button class="sum">+</button>
<button class="sub">-</button>
<button class="mul">*</button>
<button class="div">/</button>

<button class="clear">Clear History</button>

<h3 class="results"></h3>
<h3>History:</h3>
<ul class="history"></ul>

<script src="script.js"></script>
</body>
</html>
